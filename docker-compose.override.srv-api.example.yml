# Conecta api-pac-quality à rede Docker do delpi-central (postgres-plugins, core-api).
#
# Uso:
#   cd ~/projetos/api-pac-quality
#   docker network ls | grep delpi          # anote o nome (ex.: infra_delpi-network)
#   # Se o nome for diferente, edite a linha "name:" abaixo
#   cp docker-compose.override.srv-api.example.yml docker-compose.override.yml
#   docker compose up -d --build
#
# Sem este override, use PLUGINS_DB_HOST com IP/porta acessível do host.

services:
  api-pac-quality:
    networks:
      - pac-network
      - delpi-network
    environment:
      # Delegação CRUD → api-delpi (mesma rede Docker do delpi-central)
      API_DELPI_BASE_URL: http://api-delpi:8000
      PAC_DELEGATE_TRANSACTIONAL_TO_API_DELPI: "true"
      # API_DELPI_INTERNAL_SERVICE_TOKEN: copiar do infra/.env do delpi-central

networks:
  delpi-network:
    external: true
    name: infra_delpi-network
