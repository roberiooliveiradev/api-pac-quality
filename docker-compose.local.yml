# Override local — mesma rede do delpi-central (postgres-plugins + keycloak).
services:
  api-pac-quality:
    environment:
      PUBLIC_BASE_URL: http://localhost:8082
      PLUGINS_DB_HOST: postgres-plugins
      KEYCLOAK_JWKS_URL: http://keycloak:8080/auth/realms/delpi/protocol/openid-connect/certs
      KEYCLOAK_ISSUER: http://localhost/auth/realms/delpi
      KEYCLOAK_AUDIENCE: delpi-central
    networks:
      - pac-network
      - delpi-network

  nginx:
    ports:
      - "8082:80"
    networks:
      - pac-network
      - delpi-network

networks:
  delpi-network:
    external: true
    name: infra_delpi-network
