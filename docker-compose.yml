# Stack standalone: API PAC Qualidade + nginx próprio.
#
# Build context = pasta pai `projetos/` (`api-pac-quality/Dockerfile`).
#
#   cd api-pac-quality
#   cp .env.example .env
#   docker compose up -d --build
#
# Público: GET http://localhost:${NGINX_HTTP_PORT:-8082}/health  (via nginx)

name: api-pac-quality

services:
  api-pac-quality:
    build:
      context: ..
      dockerfile: api-pac-quality/Dockerfile
    image: api-pac-quality:latest
    container_name: api-pac-quality
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_PAC_QUALITY_PORT: "8010"
      API_PAC_ROOT_PATH: ${API_PAC_ROOT_PATH:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://pac-api.minhadelpi.com.br}
    expose:
      - "8010"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - pac-network

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: api-pac-quality-nginx:latest
    container_name: api-pac-quality-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    depends_on:
      api-pac-quality:
        condition: service_healthy
    networks:
      - pac-network

networks:
  pac-network:
    driver: bridge
