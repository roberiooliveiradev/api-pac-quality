events {}

http {
  resolver 127.0.0.11 valid=30s ipv6=off;

  proxy_buffer_size 256k;
  proxy_buffers 8 512k;
  proxy_busy_buffers_size 512k;
  large_client_header_buffers 8 256k;

  map $http_x_forwarded_proto $pac_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
  }

  limit_req_zone $binary_remote_addr zone=pac_api_zone:10m rate=30r/s;
  limit_req_status 429;

  upstream api_pac_quality {
    server api-pac-quality:8010;
  }

  server {
    listen 80;
    server_name pac-api.minhadelpi.com.br;

    client_max_body_size 25m;

    location ~ /\.(env|git|htaccess|htpasswd|docker|npmrc) {
      deny all;
      return 404;
    }

    location / {
      limit_req zone=pac_api_zone burst=50 nodelay;

      proxy_pass http://api_pac_quality;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $pac_proto;

      proxy_read_timeout 86400;
      proxy_connect_timeout 30s;
      proxy_send_timeout 86400;

      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
      add_header Pragma "no-cache" always;
      add_header Expires "0" always;
      proxy_no_cache 1;
      proxy_cache_bypass 1;
    }
  }
}
